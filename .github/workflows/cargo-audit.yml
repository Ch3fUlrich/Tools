name: cargo-audit

on:
  schedule:
    # Weekly run on Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - 'backend/Cargo.toml'
      - 'backend/Cargo.lock'

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Run cargo audit
        working-directory: ./backend
        # RUSTSEC-2023-0071: rsa Marvin attack (medium, no fix available — transitive via sqlx-mysql/openidconnect)
        run: cargo audit --ignore RUSTSEC-2023-0071
