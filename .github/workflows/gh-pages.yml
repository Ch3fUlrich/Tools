name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deployment at a time; cancel older runs on the same branch.
concurrency:
  group: gh-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write      # required for actions/deploy-pages
  id-token: write   # required for OIDC token used by actions/deploy-pages

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site for GitHub Pages
        run: pnpm --filter frontend run build
        env:
          # Serve from /<repo-name>/ on GitHub Pages
          GITHUB_PAGES: 'true'
          GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}
          # No backend on GitHub Pages — tools show a "backend unavailable" banner
          NEXT_PUBLIC_API_URL: ''
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Add .nojekyll (prevents Jekyll processing)
        run: touch frontend/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/out

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
