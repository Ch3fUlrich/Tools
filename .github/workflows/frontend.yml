name: Frontend CI

on:
  push:
    branches-ignore: [ main ]
    paths:
      - 'frontend/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/frontend.yml'

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Security audit
      run: pnpm audit --audit-level moderate --prod

    - name: Run frontend tests
      run: pnpm --filter frontend test

    - name: Upload frontend coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        # vitest outputs lcov to frontend/coverage/lcov.info when run from frontend dir
        files: frontend/coverage/lcov.info
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: Ch3fUlrich/Tools

    - name: Upload frontend coverage artifact (fallback)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: frontend-coverage-lcov
        path: frontend/coverage/lcov.info
    
    - name: Run ESLint
      run: pnpm --filter frontend run lint

    - name: Run Stylelint
      run: pnpm --filter frontend run lint:css
    
    - name: Build
      run: pnpm --filter frontend run build
    
    - name: Check for build artifacts
      run: test -d frontend/.next
