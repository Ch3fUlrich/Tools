name: Integration Tests & Build

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  integration:
    name: Full integration tests (Postgres + Redis)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tools
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: tools
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tools -d tools" --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Set environment
        run: |
          echo "TEST_DATABASE_URL=postgres://tools:pass@localhost:5432/tools" >> $GITHUB_ENV
          echo "DATABASE_URL=postgres://tools:pass@localhost:5432/tools" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379" >> $GITHUB_ENV

      - name: Run database migrations
        run: |
          for f in $(ls backend/migrations/*.sql | sort); do
            echo "Applying migration: $f"
            PGPASSWORD=pass psql -h localhost -U tools -d tools -f "$f"
          done

      - name: Run backend integration tests
        run: |
          cd backend
          cargo test --workspace --all-features --no-fail-fast

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install and test frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter frontend test

      - name: Build frontend (production)
        run: pnpm --filter frontend run build
