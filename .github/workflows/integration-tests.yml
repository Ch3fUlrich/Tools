name: Integration Tests & Build
run-name: Integration Tests & Build (${{ github.event.workflow_run.head_branch }})

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  integration:
    name: Full Docker stack smoke test
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Build full Docker stack
        run: |
          docker compose build

      - name: Start full Docker stack
        run: |
          docker compose up -d

      - name: Smoke test backend and frontend containers
        run: |
          timeout 90 bash -c 'until curl -fsS http://localhost:3001/api/health; do sleep 3; done'
          timeout 90 bash -c 'until curl -fsS http://localhost:8080/; do sleep 3; done'

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v
