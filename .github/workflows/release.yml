name: Release (semantic)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  id-token: write   # needed for OIDC in Docker buildx

jobs:
  semantic-release:
    name: Create semantic release
    runs-on: ubuntu-latest
    # Only release when CI passes on the main branch
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Persist credentials so the release commit can be pushed
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install semantic-release plugins
        run: |
          npm install --save-dev \
            semantic-release \
            @semantic-release/github

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Capture the tag that exists before the release
          BEFORE_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")

          # Run semantic-release
          npx semantic-release

          # Check if a new tag was created
          AFTER_TAG=$(git fetch --tags && git describe --tags --abbrev=0 2>/dev/null || echo "none")
          if [ "$AFTER_TAG" != "$BEFORE_TAG" ] && [ "$AFTER_TAG" != "none" ]; then
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            echo "new_release_version=${AFTER_TAG#v}" >> $GITHUB_OUTPUT
            echo "new_release_tag=$AFTER_TAG" >> $GITHUB_OUTPUT
            echo "New release detected: $AFTER_TAG"
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
            echo "No new release created"
          fi

  docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: semantic-release
    # Only run if a new release was published
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tools-backend:v${{ needs.semantic-release.outputs.new_release_version }}
            ghcr.io/${{ github.repository_owner }}/tools-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tools-frontend:v${{ needs.semantic-release.outputs.new_release_version }}
            ghcr.io/${{ github.repository_owner }}/tools-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
