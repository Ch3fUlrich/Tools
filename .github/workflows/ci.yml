name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  smoke:
    name: Quick smoke tests (fast)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Quick backend unit tests
        run: |
          cd backend
          cargo test --workspace --lib --locked || true

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Quick frontend unit tests
        run: pnpm --filter frontend test --silent || true

  backend:
    name: Backend tests (Postgres + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tools
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: tools
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tools -d tools" --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Set environment
        run: |
          echo "TEST_DATABASE_URL=postgres://tools:pass@localhost:5432/tools" >> $GITHUB_ENV
          echo "DATABASE_URL=postgres://tools:pass@localhost:5432/tools" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379" >> $GITHUB_ENV

      - name: Run database migrations
        run: |
          for f in $(ls backend/migrations/*.sql | sort); do
            echo "Applying migration: $f"
            PGPASSWORD=pass psql -h localhost -U tools -d tools -f "$f"
          done

      - name: Run backend tests
        run: |
          cd backend
          cargo test --workspace --all-features --no-fail-fast

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm --filter frontend test

  build-artifacts:
    name: Build artifacts
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build backend (release)
        run: |
          cd backend
          cargo build --release --locked

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend (production)
        run: pnpm --filter frontend run build

      - name: Package build artifacts (zip)
        run: |
          mkdir -p artifacts
          cp backend/target/release/tools-backend artifacts/ || true
          cp -r frontend/out artifacts/frontend-out || true
          cd artifacts
          zip -r ../build-artifacts.zip . || true

      - name: Upload zipped artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-zip
          path: build-artifacts.zip
