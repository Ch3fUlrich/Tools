name: Automerge Dependabot

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
    branches: [ main ]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  automerge-low-risk-updates:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Patch and minor updates are treated as non-destructive: they are
      # auto-approved and auto-merged once all required checks pass.
      # Requires two repo settings (both enabled):
      #   - "Allow auto-merge"
      #   - "Allow GitHub Actions to create and approve pull requests"
      - name: Auto-approve low-risk Dependabot PRs
        if: contains(fromJSON('["version-update:semver-patch", "version-update:semver-minor"]'), steps.metadata.outputs.update-type)
        run: gh pr review --approve "$PR_URL" --body "Auto-approved low-risk $UPDATE_TYPE dependency update."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for low-risk Dependabot PRs
        if: contains(fromJSON('["version-update:semver-patch", "version-update:semver-minor"]'), steps.metadata.outputs.update-type)
        run: |
          gh pr merge --auto --squash "$PR_URL"
          gh pr comment "$PR_URL" --body "Low-risk $UPDATE_TYPE dependency update: auto-approved and queued for auto-merge once required checks pass."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Major updates can contain breaking changes — leave them for a human.
      - name: Leave major updates for manual review
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: echo "Major dependency update detected; skipping auto-approval and auto-merge."
